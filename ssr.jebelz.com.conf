# Upstream for Next.js app
upstream ssr_nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 75s;
}

# HTTPS Server
server {
    listen 103.139.75.53:443 ssl;
    http2 on;
    server_name ssr.jebelz.com;

    # Use existing wildcard SSL certificate
    ssl_certificate /ssl/certs/jebelz.com.cert;
    ssl_certificate_key /ssl/keys/jebelz.com.key;

    # Logs
    access_log /var/log/nginx/ssr.jebelz.com_access.log;
    error_log /var/log/nginx/ssr.jebelz.com_error.log;

    # Security Headers
    add_header Access-Control-Allow-Origin *;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Timeouts
    client_max_body_size 100m;
    client_body_buffer_size 1m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    client_header_timeout 60s;
    client_body_timeout 60s;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Gzip Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    location / {
        # Proxy headers for Next.js
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy to Next.js
        proxy_pass http://ssr_nextjs_upstream;
        proxy_redirect off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}

# HTTP to HTTPS Redirect
server {
    listen 103.139.75.53:80;
    server_name ssr.jebelz.com;
    return 301 https://ssr.jebelz.com$request_uri;
}


